<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Promo Reels Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

  <div class="max-w-7xl mx-auto px-6 py-10">
    <!-- Header -->
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-slate-800 pb-6 mb-8 gap-4">
      <div>
        <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-indigo-500">
          🎬 Weekly Promo Reels Studio
        </h1>
        <p class="text-slate-400 text-sm mt-1">Automated HTML to MP4 Video Engine</p>
      </div>

      <button id="generateBtn" onclick="triggerBatch()" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-6 rounded-xl transition shadow-lg shadow-indigo-600/30">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
        <span>Generate Now</span>
      </button>
    </header>

    <!-- Status Banner -->
    <div id="statusBanner" class="hidden mb-8 p-4 rounded-xl bg-slate-900 border border-slate-800 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div id="statusSpinner" class="animate-spin rounded-full h-5 w-5 border-b-2 border-cyan-400"></div>
        <span id="statusText" class="text-slate-200 font-medium">Processing...</span>
      </div>
    </div>

    <!-- Video Grid -->
    <main>
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-slate-200">Current Week Videos</h2>
        <span id="videoCount" class="bg-slate-800 text-cyan-400 text-xs font-semibold px-3 py-1 rounded-full border border-slate-700">0 Reels</span>
      </div>

      <div id="videoGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <!-- Cards loaded dynamically via JavaScript -->
      </div>
    </main>
  </div>

  <script>
    async function loadVideos() {
      const grid = document.getElementById('videoGrid');
      const countLabel = document.getElementById('videoCount');
      
      try {
        const res = await fetch('/api/videos');
        const data = await res.json();
        
        countLabel.innerText = `${data.count} Reels`;
        grid.innerHTML = '';

        if (data.count === 0) {
          grid.innerHTML = `
            <div class="col-span-full text-center py-20 border-2 border-dashed border-slate-800 rounded-2xl">
              <i class="fa-solid fa-film text-4xl text-slate-600 mb-3"></i>
              <p class="text-slate-400">No promo videos generated yet.</p>
              <p class="text-slate-500 text-sm mt-1">Click "Generate Now" or wait for weekly cron run.</p>
            </div>`;
          return;
        }

        data.videos.forEach(video => {
          const card = document.createElement('div');
          card.className = "bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-xl flex flex-col";
          card.innerHTML = `
            <div class="relative aspect-[9/16] bg-black">
              <video src="${video.download_url}" controls class="w-full h-full object-cover"></video>
            </div>
            <div class="p-5 flex justify-between items-center bg-slate-900">
              <span class="text-sm font-semibold text-slate-300 font-mono">${video.filename}</span>
              <a href="${video.download_url}" download class="bg-slate-800 hover:bg-slate-700 text-cyan-400 p-3 rounded-lg transition border border-slate-700">
                <i class="fa-solid fa-download"></i>
              </a>
            </div>
          `;
          grid.appendChild(card);
        });
      } catch (err) {
        console.error('Failed to load videos:', err);
      }
    }

    async function triggerBatch() {
      const btn = document.getElementById('generateBtn');
      const banner = document.getElementById('statusBanner');
      const statusText = document.getElementById('statusText');

      btn.disabled = true;
      btn.classList.add('opacity-50', 'cursor-not-allowed');
      banner.classList.remove('hidden');
      statusText.innerText = "Generating new promo reels... Please wait.";

      try {
        const res = await fetch('/api/generate-now', { method: 'POST' });
        if (res.ok) {
          statusText.innerText = "Success! New videos generated.";
          setTimeout(() => banner.classList.add('hidden'), 3000);
          await loadVideos();
        } else {
          statusText.innerText = "Error generating videos.";
        }
      } catch (err) {
        statusText.innerText = "Server error occurred.";
      } finally {
        btn.disabled = false;
        btn.classList.remove('opacity-50', 'cursor-not-allowed');
      }
    }

    // Load initial videos on page load
    loadVideos();
  </script>
</body>
</html>
