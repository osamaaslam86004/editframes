<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flash Sale Reel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1080px;
      height: 1920px;
      background: #090d16;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: #ffffff;
      padding: 80px 60px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .badge {
      background: #ef4444;
      padding: 20px 40px;
      font-size: 36px;
      font-weight: bold;
      border-radius: 50px;
      align-self: flex-start;
      box-shadow: 0 10px 25px rgba(239, 68, 68, 0.4);
    }
    .img-card {
      width: 960px;
      height: 960px;
      margin: 0 auto;
      border-radius: 40px;
      overflow: hidden;
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    .img-card img {
      max-width: 85%;
      max-height: 85%;
      object-fit: contain;
    }
    .details {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .title {
      font-size: 58px;
      font-weight: 800;
      line-height: 1.2;
      color: #f8fafc;
    }
    .price {
      font-size: 80px;
      color: #4ade80;
      font-weight: 900;
    }
    .cta {
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      padding: 36px;
      text-align: center;
      font-size: 48px;
      font-weight: 800;
      border-radius: 28px;
      text-transform: uppercase;
      box-shadow: 0 15px 35px rgba(99, 102, 241, 0.4);
    }
  </style>
</head>
<body>
  <div class="badge">⚡ WEEKLY FLASH SALE</div>
  
  <div class="img-card">
    <img src="{{IMAGE_URL}}" alt="Product">
  </div>

  <div class="details">
    <div class="title">{{PRODUCT_TITLE}}</div>
    <div class="price">${{PRICE}}</div>
  </div>

  <div class="cta">SHOP NOW — LINK IN BIO 🛍️</div>
</body>
</html>
