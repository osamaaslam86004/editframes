<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flash Sale Reel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1080px;
      height: 1920px;
      background: #090d16;
      overflow: hidden;
      font-family: 'Montserrat', sans-serif, system-ui;
      color: #ffffff;
    }
    
    .container {
      width: 1080px;
      height: 1920px;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 80px 60px;
      background: radial-gradient(circle at top right, #1e1b4b, #090d16);
    }

    /* Top Flash Sale Badge */
    .header-badge {
      align-self: flex-start;
      background: #ef4444;
      color: #ffffff;
      font-size: 38px;
      font-weight: 900;
      padding: 16px 36px;
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 10px 30px rgba(239, 68, 68, 0.5);
      animation: pulse 1.5s infinite alternate;
    }

    /* Product Image Display Card */
    .product-stage {
      width: 960px;
      height: 960px;
      margin: 0 auto;
      border-radius: 40px;
      overflow: hidden;
      position: relative;
      border: 4px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
      animation: zoomIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .product-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Price Callout Overlay */
    .price-tag {
      position: absolute;
      bottom: 40px;
      right: 40px;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(12px);
      border: 2px solid #22c55e;
      padding: 20px 40px;
      border-radius: 24px;
      text-align: right;
    }

    .old-price {
      font-size: 36px;
      color: #94a3b8;
      text-decoration: line-through;
    }

    .new-price {
      font-size: 72px;
      font-weight: 900;
      color: #4ade80;
    }

    /* Product Info Section */
    .info-section {
      animation: slideUp 1s ease-out 0.3s backwards;
    }

    .product-title {
      font-size: 64px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 20px;
      color: #f8fafc;
    }

    .cta-button {
      width: 100%;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      color: #ffffff;
      font-size: 48px;
      font-weight: 800;
      text-align: center;
      padding: 36px;
      border-radius: 28px;
      box-shadow: 0 15px 35px rgba(99, 102, 241, 0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Progress/Timer Bar */
    .timer-bar {
      width: 100%;
      height: 16px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow: hidden;
      margin-top: 40px;
    }

    .timer-progress {
      height: 100%;
      background: #ef4444;
      width: 100%;
      animation: countdown 6s linear forwards;
    }

    /* Keyframe Animations */
    @keyframes pulse {
      0% { transform: scale(1); }
      100% { transform: scale(1.05); }
    }

    @keyframes zoomIn {
      0% { opacity: 0; transform: scale(0.85); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes slideUp {
      0% { opacity: 0; transform: translateY(40px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes countdown {
      0% { width: 100%; }
      100% { width: 0%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-badge">⚡ 24-HOUR FLASH SALE</div>

    <div class="product-stage">
      <img class="product-img" src="{{IMAGE_URL}}" alt="Product">
      <div class="price-tag">
        <div class="old-price">{{ORIGINAL_PRICE}}</div>
        <div class="new-price">{{SALE_PRICE}}</div>
      </div>
    </div>

    <div class="info-section">
      <h1 class="product-title">{{PRODUCT_TITLE}}</h1>
      <div class="cta-button">SHOP NOW — LINK IN BIO 🛍️</div>
      <div class="timer-bar">
        <div class="timer-progress"></div>
      </div>
    </div>
  </div>
</body>
</html>
