<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Batch Short Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1080px;
      height: 1920px;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .video-canvas {
      width: 1080px;
      height: 1920px;
      position: relative;
      background: #0f172a;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
    }
    .scene {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      display: none;
    }
    .scene.active { display: block; }
    #scene1 { background: linear-gradient(135deg, #1e3a8a, #0f172a); }
    #scene2 { background: linear-gradient(135deg, #065f46, #0f172a); }

    .caption-overlay {
      position: absolute;
      bottom: 150px;
      left: 50px;
      right: 50px;
      background: rgba(0, 0, 0, 0.8);
      color: #ffffff;
      padding: 30px;
      border-radius: 20px;
      font-size: 52px;
      font-weight: bold;
      text-align: center;
      z-index: 10;
      border: 2px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div class="video-canvas">
    <!-- Scene 1 -->
    <div id="scene1" class="scene active">
      <video id="v1" src="https://assets.editframe.com/departure-prep.mp4" autoplay loop muted playsinline preload="auto"></video>
      <div class="caption-overlay">Scene 1: Departure Prep ✈️</div>
    </div>

    <!-- Scene 2 -->
    <div id="scene2" class="scene">
      <video id="v2" src="https://assets.editframe.com/window-seat.mp4" autoplay loop muted playsinline preload="auto"></video>
      <div class="caption-overlay">Scene 2: Window View 🌥️</div>
    </div>
  </div>

  <script>
    // Sequence switching logic (4 seconds per clip)
    setTimeout(() => {
      document.getElementById('scene1').classList.remove('active');
      const scene2 = document.getElementById('scene2');
      scene2.classList.add('active');
      const v2 = document.getElementById('v2');
      if (v2) v2.play();
    }, 4000);
  </script>
</body>
</html>
