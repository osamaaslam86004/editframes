<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Intermediate Example - Media Sequencing & Overlays</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #0f172a;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* Video Frame Canvas */
    .stage {
      width: 1920px;
      height: 1080px;
      position: relative;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* Animated Card Component */
    .card {
      background: rgba(30, 41, 59, 0.8);
      border: 2px solid #38bdf8;
      border-radius: 20px;
      padding: 60px 80px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      text-align: center;
      animation: slideIn 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .badge {
      display: inline-block;
      background: #38bdf8;
      color: #0f172a;
      font-weight: bold;
      font-size: 24px;
      padding: 8px 20px;
      border-radius: 30px;
      text-transform: uppercase;
      margin-bottom: 20px;
      animation: fadeIn 2s ease-in-out;
    }

    .title {
      color: #ffffff;
      font-size: 72px;
      font-weight: 800;
      margin-bottom: 15px;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 36px;
    }

    @keyframes slideIn {
      0% { opacity: 0; transform: translateY(50px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="card">
      <div class="badge">Intermediate Example</div>
      <div class="title">Media Sequencing & Overlays 🎬</div>
      <div class="subtitle">Rendered smoothly with Python + Playwright</div>
    </div>
  </div>
</body>
</html>
